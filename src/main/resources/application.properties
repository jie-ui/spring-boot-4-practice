# ─────────────────────────────────────────────
# Spring Boot 4 Practice — Application Config
# ─────────────────────────────────────────────

# Server
server.port=8080

# ── H2 In-Memory Database ──────────────────────
# Study note: Spring Boot auto-configures H2 when it is on the classpath.
# The data is lost when the application stops — perfect for dev/testing.
spring.datasource.url=jdbc:h2:mem:practicedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console ────────────────────────────────
# Browse the DB at http://localhost:8080/h2-console during development.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────
# create-drop: recreates schema on startup and drops on shutdown (dev only).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Spring Boot 4 ships with Hibernate 7 (Jakarta Persistence 3.2).
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Defer data.sql execution until after JPA schema creation completes.
spring.jpa.defer-datasource-initialization=true

# ── Actuator ──────────────────────────────────
# Expose health and info endpoints.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Application Info (shown by /actuator/info) ─
info.app.name=spring-boot-4-practice
info.app.description=Personal study notes and practice for Spring Boot 4
info.app.version=0.0.1-SNAPSHOT
